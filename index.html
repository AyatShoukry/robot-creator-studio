<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Robot Creator Studio</title>

       <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js">
    </script>

    <style>
        :root {
            --bg: #FFF8E7;
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --text: #2C3E50;
            --blue: #5B9BD5;
            --green: #6BCB77;
            --yellow: #FFD93D;
            --purple: #A97BCA;
            --orange: #FF8C42;
            --shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            --shadow-sm: 0 3px 8px rgba(0, 0, 0, 0.05);
            --radius: 18px;
            --radius-sm: 10px;
            --font: 'Lexend', Arial, sans-serif;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font);
            background: linear-gradient(135deg, #FFF8E7 0%, #FFF0D5 25%, #FFE8EC 50%, #E8F8FF 75%, #FFF8E7 100%);
            background-size: 400% 400%;
            animation: bgShift 20s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            touch-action: manipulation;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        @keyframes bgShift {
            0%,100%{background-position:0% 50%}
            25%{background-position:100% 0%}
            50%{background-position:100% 100%}
            75%{background-position:0% 100%}
        }

        .game-wrapper {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .name-overlay {
            position: absolute;
            inset: 0;
            z-index: 300;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.4s ease;
        }
        .name-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .name-card {
            background: #FFFEF9;
            border-radius: 24px;
            padding: clamp(20px,4vmin,32px);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 85vw;
            max-width: 420px;
            border: 3px dashed #FFD93D;
        }
        .name-card h2 {
            font-size: clamp(1.3rem,3.5vmin,1.8rem);
            color: #2C3E50;
            margin-bottom: 6px;
            letter-spacing: 0.04em;
        }
        .name-card p {
            color: #7F8C8D;
            font-size: 0.9rem;
            margin-bottom: 16px;
            letter-spacing: 0.03em;
        }
        .name-input {
            width: 100%;
            padding: 14px 18px;
            border: 3px dashed #4ECDC4;
            border-radius: 20px;
            font-family: var(--font);
            font-size: 1.1rem;
            text-align: center;
            font-weight: 700;
            color: #2C3E50;
            outline: none;
            letter-spacing: 0.04em;
            transition: all var(--transition);
            margin-bottom: 14px;
        }
        .name-input:focus {
            border-color: #FF6B6B;
            border-style: solid;
            box-shadow: 0 0 0 5px rgba(255,107,107,0.1);
        }
        .btn-enter {
            padding: 14px 40px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg,#FF6B6B,#FF8E53);
            color: #FFF;
            font-family: var(--font);
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.04em;
            box-shadow: 0 6px 20px rgba(255,107,107,0.35);
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .btn-enter:active {
            transform: scale(0.94);
        }

        .welcome-screen {
            position: absolute;
            inset: 0;
            z-index: 100;
            background: linear-gradient(160deg,#FFFFFF 0%,#FFF8E7 40%,#FFE8EC 70%,#E8F0FF 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4vmin;
            transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
            overflow: hidden;
        }
        .welcome-screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.93);
        }
        .welcome-bg-dots {
            position: absolute;
            inset: 0;
            pointer-events: none;
            opacity: 0.25;
        }
        .welcome-bg-dot {
            position: absolute;
            border-radius: 50%;
            background: var(--accent);
            animation: dotFloat 6s ease-in-out infinite;
        }
        @keyframes dotFloat {
            0%,100%{transform:translateY(0) scale(1)}
            50%{transform:translateY(-25px) scale(1.25)}
        }
        .welcome-icon {
            font-size: 12vmin;
            animation: welcomeBounce 1.5s ease-in-out infinite;
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.1));
            z-index: 1;
        }
        @keyframes welcomeBounce {
            0%,100%{transform:translateY(0)}
            30%{transform:translateY(-18px)}
            50%{transform:translateY(0)}
            70%{transform:translateY(-8px)}
            85%{transform:translateY(0)}
        }
        .welcome-title {
            font-size: clamp(1.8rem,7vmin,3rem);
            font-weight: 800;
            color: #2C3E50;
            text-align: center;
            z-index: 1;
            line-height: 1.2;
            padding: 0 16px;
            letter-spacing: 0.03em;
        }
        .welcome-subtitle {
            font-size: clamp(0.9rem,3.5vmin,1.4rem);
            color: #5D6D7E;
            text-align: center;
            z-index: 1;
            font-weight: 500;
            padding: 0 16px;
            letter-spacing: 0.02em;
        }
        .btn-start {
            z-index: 1;
            padding: clamp(14px,3vmin,20px) clamp(40px,10vmin,70px);
            font-size: clamp(1.1rem,4vmin,1.7rem);
            font-weight: 700;
            font-family: var(--font);
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg,#FF6B6B 0%,#FF8E53 100%);
            color: #FFF;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255,107,107,0.35);
            transition: all var(--transition);
            letter-spacing: 0.04em;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-start:active {
            transform: scale(0.94);
        }

        .main-game {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            opacity: 0;
            pointer-events: none;
            transform: translateY(15px);
            transition: all 0.45s cubic-bezier(0.4,0,0.2,1);
            background: #FFFFFF;
            position: absolute;
            inset: 0;
            z-index: 50;
        }
        .main-game.active {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }

        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px;
            background: #FAFBFC;
            border-bottom: 1.5px solid #F0F0F0;
            flex-shrink: 0;
            gap: 8px;
            flex-wrap: wrap;
        }
        .student-badge {
            background: #4ECDC4;
            color: #FFF;
            padding: 7px 14px;
            border-radius: 20px;
            font-weight: 700;
            font-size: clamp(0.75rem,2vmin,0.9rem);
            letter-spacing: 0.03em;
            white-space: nowrap;
        }
        .robot-name-input {
            flex: 1;
            min-width: 100px;
            padding: 10px 14px;
            border: 2.5px dashed #4ECDC4;
            border-radius: 25px;
            font-family: var(--font);
            font-size: clamp(0.85rem,2.5vmin,1rem);
            font-weight: 600;
            color: #2C3E50;
            background: #FFF;
            text-align: center;
            letter-spacing: 0.03em;
            outline: none;
            transition: all var(--transition);
        }
        .robot-name-input:focus {
            border-color: #FF6B6B;
            box-shadow: 0 0 0 4px rgba(255,107,107,0.1);
            border-style: solid;
        }
        .btn-gallery {
            padding: 10px 16px;
            border: 2px solid #FFD93D;
            border-radius: 25px;
            background: #FFFEF5;
            cursor: pointer;
            font-family: var(--font);
            font-size: clamp(0.8rem,2.2vmin,0.9rem);
            font-weight: 700;
            color: #E0B820;
            letter-spacing: 0.03em;
            white-space: nowrap;
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .btn-gallery:active {
            transform: scale(0.93);
        }
        .btn-teacher {
            padding: 8px 14px;
            border: 2px solid transparent;
            border-radius: 20px;
            background: transparent;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.5;
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .btn-teacher:active {
            opacity: 1;
            background: #F0F0F0;
        }

        .left-panel {
            width: 100%;
            flex-shrink: 0;
            background: #FAFBFC;
            padding: clamp(6px,1.5vmin,10px) clamp(8px,2vmin,14px);
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            overflow-x: auto;
            overflow-y: hidden;
            border-bottom: 1.5px solid #F0F0F0;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            align-items: center;
        }
        .left-panel::-webkit-scrollbar{height:3px}
        .panel-header {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
            width: 100%;
            justify-content: space-between;
        }
        .panel-title {
            font-size: clamp(0.95rem,2.8vmin,1.2rem);
            font-weight: 700;
            color: #2C3E50;
            letter-spacing: 0.03em;
            white-space: nowrap;
        }
        .progress-bar-wrap {
            flex: 1;
            max-width: 120px;
            height: 7px;
            background: #E8ECF1;
            border-radius: 7px;
            overflow: hidden;
            margin: 0 6px;
        }
        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg,#4ECDC4,#6BCB77);
            border-radius: 7px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .step-indicators {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
        }
        .step-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #DDE1E7;
            transition: all var(--transition);
        }
        .step-dot.done {
            background: #4ECDC4;
            box-shadow: 0 0 4px rgba(78,205,196,0.4);
        }
        .category-scroll {
            display: flex;
            gap: 7px;
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .category-scroll::-webkit-scrollbar{height:0}
        .category-group {
            background: #FFF;
            border-radius: var(--radius-sm);
            padding: clamp(7px,1.5vmin,10px) clamp(8px,1.8vmin,12px);
            box-shadow: var(--shadow-sm);
            flex-shrink: 0;
        }
        .category-label {
            font-size: clamp(0.6rem,1.8vmin,0.75rem);
            font-weight: 700;
            color: #7F8C8D;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .options-row {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }
        .option-btn {
            padding: 6px 11px;
            border: 2px solid #E8ECF1;
            border-radius: 18px;
            background: #FFF;
            cursor: pointer;
            font-family: var(--font);
            font-size: clamp(0.65rem,2vmin,0.8rem);
            font-weight: 600;
            color: #555;
            letter-spacing: 0.03em;
            white-space: nowrap;
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .option-btn:active{transform:scale(0.92)}
        .option-btn.selected {
            border-color: #4ECDC4;
            background: #E8FAF8;
            color: #2AA89F;
            box-shadow: 0 0 0 3px rgba(78,205,196,0.1);
            font-weight: 700;
        }
        .color-row {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            align-items: center;
        }
        .color-swatch {
            width: clamp(24px,5.5vmin,30px);
            height: clamp(24px,5.5vmin,30px);
            border-radius: 50%;
            border: 2.5px solid #E8ECF1;
            cursor: pointer;
            transition: all var(--transition);
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .color-swatch:active{transform:scale(0.88)}
        .color-swatch.selected {
            border-color: #2C3E50;
            box-shadow: 0 0 0 4px rgba(44,62,80,0.1);
            transform: scale(1.08);
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at center,#F8FBFF 0%,#EAF4FB 40%,#DCEAF5 100%);
            position: relative;
            overflow: hidden;
            padding: 6px;
            min-height: 0;
        }
        .robot-stage {
            position: relative;
            width: 100%;
            max-width: min(360px,65vmin);
            aspect-ratio: 4/5;
            z-index: 2;
            flex-shrink: 1;
        }
        .robot-stage svg{width:100%;height:100%}
        #robot-group{animation:floatRobot 3.5s ease-in-out infinite}
        @keyframes floatRobot{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        #robot-group.jumping{animation:jumpRobot 0.6s ease-out}
        @keyframes jumpRobot{0%{transform:translateY(0) scaleY(1)}30%{transform:translateY(-40px) scaleY(0.85)}60%{transform:translateY(-14px) scaleY(1.05)}80%{transform:translateY(4px) scaleY(0.92)}100%{transform:translateY(0) scaleY(1)}}
        .eye-blink{animation:blinkEyes 3.2s ease-in-out infinite}
        @keyframes blinkEyes{0%,44%,48%,100%{transform:scaleY(1)}46%{transform:scaleY(0.06)}}
        #arms-group.waving{animation:waveArm 0.7s ease-in-out 3}
        @keyframes waveArm{0%,100%{transform:rotate(0deg)}30%{transform:rotate(-22deg)}60%{transform:rotate(8deg)}80%{transform:rotate(-6deg)}}

        .bottom-buttons {
            display: flex;
            gap: 7px;
            flex-wrap: wrap;
            justify-content: center;
            padding: clamp(5px,1.2vmin,8px) 6px;
            flex-shrink: 0;
            z-index: 3;
            width: 100%;
            max-width: 480px;
        }
        .game-btn {
            padding: clamp(9px,2vmin,12px) clamp(12px,3vmin,20px);
            border: none;
            border-radius: 50px;
            font-family: var(--font);
            font-size: clamp(0.7rem,2.3vmin,0.9rem);
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.03em;
            box-shadow: var(--shadow-sm);
            white-space: nowrap;
            transition: all var(--transition);
            -webkit-tap-highlight-color: transparent;
        }
        .game-btn:active{transform:scale(0.92)}
        .btn-random{background:#FFF;color:#5D6D7E;border:2px solid #E0E5EA}
        .btn-reset{background:#FFF;color:#5D6D7E;border:2px solid #E0E5EA}
        .btn-build{background:linear-gradient(135deg,#FF6B6B 0%,#FF8E53 100%);color:#FFF;font-size:clamp(0.75rem,2.6vmin,0.95rem);padding:clamp(10px,2.2vmin,14px) clamp(16px,4.5vmin,28px);box-shadow:0 4px 16px rgba(255,107,107,0.35)}

        .result-overlay,.gallery-overlay,.teacher-overlay {
            position: absolute;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .result-overlay.show,.gallery-overlay.show,.teacher-overlay.show{opacity:1;pointer-events:all}
        .result-card,.gallery-card,.teacher-card {
            background: #FFFEF9;
            border-radius: 20px;
            padding: clamp(14px,2.5vmin,24px) clamp(12px,2.5vmin,20px);
            max-width: 600px;
            width: 90vw;
            box-shadow: 0 16px 40px rgba(0,0,0,0.2);
            text-align: center;
            transform: translateY(25px);
            transition: transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
            max-height: 85vh;
            overflow-y: auto;
        }
        .result-overlay.show .result-card,.gallery-overlay.show .gallery-card,.teacher-overlay.show .teacher-card{transform:translateY(0)}
        .result-card-title,.gallery-title,.teacher-title{font-size:clamp(1.2rem,3.8vmin,1.6rem);font-weight:800;color:#2C3E50;margin-bottom:6px;letter-spacing:0.03em}
        .result-writing{text-align:left;background:#FFF;border-radius:14px;padding:12px 14px;margin:6px 0;font-size:clamp(0.85rem,2.6vmin,1.1rem);line-height:1.8;color:#2C3E50;font-weight:500}
        .result-writing .blank{display:inline-block;border-bottom:2.5px dashed #FF6B6B;min-width:40px;padding:0 4px;color:#FF6B6B;font-weight:700}
        .btn-close{margin-top:10px;padding:clamp(9px,1.8vmin,12px) clamp(20px,5vmin,36px);border:none;border-radius:50px;background:#4ECDC4;color:#FFF;font-family:var(--font);font-size:clamp(0.85rem,2.3vmin,1rem);font-weight:700;cursor:pointer;letter-spacing:0.03em;box-shadow:0 3px 12px rgba(78,205,196,0.3);transition:all var(--transition);-webkit-tap-highlight-color:transparent}
        .teacher-table{width:100%;border-collapse:collapse;font-size:clamp(0.6rem,1.5vmin,0.8rem);margin:10px 0}
        .teacher-table th{background:#4ECDC4;color:#FFF;padding:8px 6px;font-weight:700}
        .teacher-table td{padding:6px;border-bottom:1px solid #F0F0F0}
        .teacher-table img{width:50px;height:62px}
        .btn-export{padding:10px 20px;border:none;border-radius:25px;background:#FF8C42;color:#FFF;font-family:var(--font);font-size:0.85rem;font-weight:700;cursor:pointer;margin:4px;letter-spacing:0.03em;transition:all var(--transition)}
        .btn-export:active{transform:scale(0.94)}
        .gallery-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-height:50vh;overflow-y:auto;padding:6px}
        .gallery-item{background:#FFF;border-radius:14px;padding:8px;box-shadow:var(--shadow-sm);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;border:2px solid #F0F0F0;min-width:80px;transition:all var(--transition)}
        .gallery-item:active{transform:scale(0.94)}
        .gallery-item-name{font-size:0.7rem;font-weight:700;color:#2C3E50}
        .robot-svg-thumb{width:45px;height:56px;pointer-events:none}
        .confetti-piece{position:absolute;z-index:250;pointer-events:none;animation:confettiFall 2.5s ease-out forwards}
        @keyframes confettiFall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(100vh) rotate(720deg) scale(0.25);opacity:0}}
        .toast{position:absolute;top:16px;left:50%;transform:translateX(-50%) translateY(-120px);z-index:220;background:#2C3E50;color:#FFF;padding:10px 22px;border-radius:50px;font-weight:700;font-size:clamp(0.8rem,2vmin,0.95rem);font-family:var(--font);box-shadow:0 8px 22px rgba(0,0,0,0.2);letter-spacing:0.03em;pointer-events:none;white-space:nowrap;transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1)}
        .toast.show{transform:translateX(-50%) translateY(0)}
        .teacher-login-input{width:100%;padding:12px 16px;border:2.5px dashed #FF6B6B;border-radius:20px;font-family:var(--font);font-size:1rem;text-align:center;font-weight:700;margin:8px 0;letter-spacing:0.04em;outline:none}

        @media(min-width:768px) and (orientation:landscape){
            .main-game{flex-direction:row;flex-wrap:wrap}
            .top-bar{width:100%}
            .left-panel{width:34%;min-width:290px;max-width:400px;height:calc(100% - 50px);flex-wrap:nowrap;flex-direction:column;overflow-y:auto;overflow-x:hidden;border-bottom:none;border-right:1.5px solid #F0F0F0;padding:10px;gap:8px}
            .category-scroll{flex-direction:column;overflow-y:auto;overflow-x:hidden;gap:8px}
            .category-group{min-width:auto;width:100%}
            .right-panel{flex:1;height:calc(100% - 50px)}
            .robot-stage{max-width:min(400px,45vmin)}
        }
    </style>
</head>
<body>
    <div class="game-wrapper" id="gameWrapper">

        <div class="name-overlay" id="nameOverlay">
            <div class="name-card">
                <h2>👋 What's your name?</h2>
                <p>Type your name to start creating!</p>
                <input type="text" class="name-input" id="studentNameInput" placeholder="My name is..." maxlength="30" autofocus>
                <br>
                <button class="btn-enter" id="btnEnterName">🚀 Let's Go!</button>
            </div>
        </div>

        <div class="welcome-screen hidden" id="welcomeScreen">
            <div class="welcome-bg-dots" id="welcomeDots"></div>
            <div class="welcome-icon">🤖</div>
            <h1 class="welcome-title">Robot Creator Studio</h1>
            <p class="welcome-subtitle">Design your own amazing robot!</p>
            <button class="btn-start" id="btnStart">🚀 Start Creating!</button>
        </div>

        <div class="main-game" id="mainGame">
            <div class="top-bar">

                    try {
                        const c = this.getContext(),
                            o = c.createOscillator(),
                            g = c.createGain();
                        o.type = t;
                        o.frequency.setValueAtTime(f, c.currentTime);
                        g.gain.setValueAtTime(v, c.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
                        o.connect(g);

                        o.start(c.currentTime);

            function svgToPngBase64(svgString, width = 400, height = 480) {
                return new Promise((resolve) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    const img = new Image();
                    const blob = new Blob([svgString], { type: 'image/svg+xml' });
                    const url = URL.createObjectURL(blob);
                    img.onload = () => {
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillRect(0, 0, width, height);
                        ctx.drawImage(img, 0, 0, width, height);
                        URL.revokeObjectURL(url);
                        resolve(canvas.toDataURL('image/png'));
                    };
                    img.onerror = () => resolve('');
                    img.src = url;
                });
            }

            function buildCategoriesUI() {
                const cats = [
                    { id: 'head', label: '🤖 Head', opts: ['Round', 'Square', 'Hexagon', 'Oval'], key: 'head',
                        cls: 'opt-head' },
                    { id: 'eyes', label: '👀 Eyes', opts: ['Round', 'Star', 'Visor', 'Heart'], key: 'eyes',
                        cls: 'opt-eyes' },
                    { id: 'mouth', label: '👄 Mouth', opts: ['Smile', 'Straight', 'Open', 'Zigzag'], key: 'mouth',
                        cls: 'opt-mouth' },
                    { id: 'arms', label: '💪 Arms', opts: ['Normal', 'Claw', 'Pincer', 'Grabber'], key: 'arms',
                        cls: 'opt-arms' },
                    { id: 'legs', label: '🦿 Legs', opts: ['Boots', 'Wheel', 'Treads', 'Spring'], key: 'legs',
                        cls: 'opt-legs' },
                    { id: 'bodyColor', label: '🎨 Color', opts: ['blue', 'green', 'yellow', 'purple', 'orange'],
                        key: 'bodyColor', cls: 'color-swatch', type: 'color' },
                    { id: 'ability', label: '⭐ Power', opts: ['fly', 'clean', 'cook', 'dance', 'swim'], key: 'ability',
                        cls: 'opt-ability', disp: ['🪽 Fly', '🧹 Clean', '🍳 Cook', '💃 Dance', '🏊 Swim'] },
                ];
                let h = '';
                cats.forEach(cat => {
                    h += `<div class="category-group"><div class="category-label">${cat.label}</div>`;
                    if (cat.type === 'color') {
                        h += `<div class="color-row">`;
                        cat.opts.forEach(o => h +=
                            `<div class="color-swatch ${cat.cls}" data-v="${o}" data-cat="${cat.key}" style="background:${bodyColorMap[o]||'#888'};" title="${o}"></div>`
                            );
                        h += `</div>`;
                    } else if (cat.disp) {
                        h += `<div class="options-row">`;
                        cat.opts.forEach((o, i) => h +=
                            `<button class="option-btn ${cat.cls}" data-v="${o}" data-cat="${cat.key}">${cat.disp[i]}</button>`
                            );
                        h += `</div>`;
                    } else {
                        h += `<div class="options-row">`;
                        cat.opts.forEach((o, i) => h +=
                            `<button class="option-btn ${cat.cls}" data-v="${i}" data-cat="${cat.key}">${o}</button>`
                            );
                        h += `</div>`;
                    }
                    h += `</div>`;
                });
                document.getElementById('categoriesContainer').innerHTML = h;
                const sd = document.getElementById('stepIndicators');
                sd.innerHTML = '';
                for (let i = 0; i < 7; i++) { const d = document.createElement('span');
                    d.className = 'step-dot';
                    sd.appendChild(d); }
            }

            async function saveToFirebase(data) {
                if (!firebaseReady || !db) return false;
                try {
                    const pngBase64 = await svgToPngBase64(data.robotSVG);
                    const docRef = await db.collection("robots").add({
                        studentName: data.studentName,
                        robotName: data.robotName,
                        headStyle: data.head,
                        eyesStyle: data.eyes,
                        mouthStyle: data.mouth,
                        armsStyle: data.arms,
                        legsStyle: data.legs,
                        bodyColor: data.bodyColor,
                        ability: data.ability,
                        robotSVG: data.robotSVG,
                        robotPNG: pngBase64,
                        writingText: data.writingText,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    console.log('✅ Saved:', docRef.id);
                    return true;
                } catch (e) {
                    console.warn('⚠️ Save failed:', e.message);
                    return false;
                }
            }

            function getCurrentRobotData() {
                const rn = document.getElementById('robotNameInput').value.trim() || 'Robo';
                const hn = ['round', 'square', 'hexagon', 'oval'];
                const en = ['round', 'star', 'visor', 'heart-shaped'];
                const an = abilityLabels[state.ability] || state.ability;
                const writing =
                    `This is ${rn}. It is ${state.bodyColor}. It has a ${hn[state.head]} head and ${en[state.eyes]} eyes. It can ${an.toLowerCase()}.`;
                return {
                    studentName: studentName,
                    robotName: rn,
                    head: state.head,
                    eyes: state.eyes,
                    mouth: state.mouth,
                    arms: state.arms,
                    legs: state.legs,
                    bodyColor: state.bodyColor,
                    ability: state.ability,
                    robotSVG: generateRobotSVGString(state),
                    writingText: writing,
                    timestamp: Date.now()
                };
            }

async function saveToSheet(data) {
  try {
    await fetch("https://api.sheetbest.com/sheets/02675f2c-a29c-4309-aebf-48ff72fa0b39", {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify([{
        studentName: data.studentName,
        robotName: data.robotName,
        bodyColor: data.bodyColor,
        ability: data.ability,
        writingText: data.writingText,
        robotPNG: data.robotPNG || 'No image',
        timestamp: new Date().toLocaleString()
      }])
    });
    console.log('✅ Sheet updated!');
  } catch (e) {
    console.log('⚠️ Sheet error:', e);
  }
} 
            function addToGallery() {
                const data = getCurrentRobotData();
                robotGallery.unshift(data);
                if (robotGallery.length > 20) robotGallery = robotGallery.slice(0, 20);
                saveGallery();
            }

            const TEACHER_PASSWORD = 'teacher123';

            function showTeacherLogin() {
                const card = document.getElementById('teacherCard');
                card.innerHTML = `
            <div class="teacher-title">🔑 Teacher Dashboard</div>
            <p style="color:#7F8C8D;">Enter password to view results</p>
            <input type="password" class="teacher-login-input" id="teacherPasswordInput" placeholder="Password...">
            <br>
            <button class="btn-enter" id="btnTeacherLogin">🔓 Unlock</button>
            <button class="btn-close" id="btnCloseTeacherLogin">✖ Cancel</button>`;
                document.getElementById('teacherOverlay').classList.add('show');
                document.getElementById('btnTeacherLogin').addEventListener('click', verifyTeacherPassword);
                document.getElementById('teacherPasswordInput').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') verifyTeacherPassword();
                });
                document.getElementById('btnCloseTeacherLogin').addEventListener('click', closeTeacherOverlay);
                setTimeout(() => document.getElementById('teacherPasswordInput').focus(), 300);
            }

            function verifyTeacherPassword() {
                const input = document.getElementById('teacherPasswordInput');
                if (input.value === TEACHER_PASSWORD) {
                    AudioEngine.success();
                    loadTeacherDashboard();
                } else {
                    showToast('❌ Wrong password!');
                    input.value = '';
                    input.focus();
                }
            }

            async function loadTeacherDashboard() {
                const card = document.getElementById('teacherCard');
                card.innerHTML =
                    `<div class="teacher-title">📊 Student Robots</div><p style="color:#7F8C8D;">Loading...</p>`;

                let allData = [];
                if (firebaseReady && db) {
                    try {
                        const snapshot = await db.collection("robots").orderBy("timestamp", "desc").limit(50)
                    .get();
                        snapshot.forEach(doc => allData.push({ id: doc.id, ...doc.data() }));
                    } catch (e) {
                        allData = [];
                    }
                }
                allData = [...allData, ...robotGallery];

                if (allData.length === 0) {
                    card.innerHTML =
                        `<div class="teacher-title">📊 Student Robots</div><p>No robots submitted yet.</p><button class="btn-close" onclick="document.getElementById('teacherOverlay').classList.remove('show')">✖ Close</button>`;
                    return;
                }

                let rows = '';
                allData.forEach((d, i) => {
                    const imgSrc = d.robotPNG || '';
                    rows += `
              <tr>
                <td>${i+1}</td>
                <td><strong>${d.studentName||'?'}</strong></td>
                <td>${d.robotName||'Robo'}</td>
                <td>${d.bodyColor||'?'}</td>
                <td>${abilityEmoji[d.ability]||'?'} ${abilityLabels[d.ability]||''}</td>
                <td>${imgSrc?`<img src="${imgSrc}" alt="robot">`:'🖼️'}</td>
                <td style="font-size:0.6rem;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.writingText||''}</td>
              </tr>`;
                });

                card.innerHTML = `
            <div class="teacher-title">📊 Student Robots (${allData.length})</div>
            <div style="max-height:50vh;overflow-y:auto;border-radius:12px;border:1px solid #F0F0F0;">
              <table class="teacher-table">
                <thead><tr><th>#</th><th>Student</th><th>Robot</th><th>Color</th><th>Power</th><th>Image</th><th>Writing</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
            <div style="margin-top:10px;">
              <button class="btn-export" id="btnExportCSV">📥 Download CSV</button>
              <button class="btn-close" id="btnCloseTeacher">✖ Close</button>
            </div>`;

                document.getElementById('btnCloseTeacher').addEventListener('click', closeTeacherOverlay);
                document.getElementById('btnExportCSV').addEventListener('click', () => exportCSV(allData));
            }

            function exportCSV(data) {
                let csv = 'Student Name,Robot Name,Body Color,Ability,Writing Text\n';
                data.forEach(d => {
                    csv +=
                        `"${d.studentName||''}","${d.robotName||''}","${d.bodyColor||''}","${abilityLabels[d.ability]||''}","${(d.writingText||'').replace(/"/g,'""')}"\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'robot_results.csv';
                a.click();
                URL.revokeObjectURL(url);
                showToast('📥 CSV Downloaded!');
            }

            function closeTeacherOverlay() {
                document.getElementById('teacherOverlay').classList.remove('show');
                AudioEngine.click();
            }

            function showGallery() {
                const overlay = document.getElementById('galleryOverlay');
                const card = document.getElementById('galleryCard');
                if (robotGallery.length === 0) {
                    card.innerHTML =
                        `<div class="gallery-title">🖼️ My Robots</div><p>No robots yet!</p><button class="btn-close" id="btnCloseGallery">👌 OK</button>`;
                } else {
                    let items = '';
                    robotGallery.forEach((r, i) => {
                        items += `
                <div class="gallery-item" data-idx="${i}">
                  <div class="gallery-item-name">${r.robotName}</div>
                  <div class="robot-svg-thumb">${r.robotSVG}</div>
                  <div style="font-size:0.6rem;">${abilityLabels[r.ability]}</div>
                </div>`;
                    });
                    card.innerHTML =
                        `<div class="gallery-title">🖼️ My Robots</div><div class="gallery-grid">${items}</div><p style="font-size:0.7rem;">Tap to load</p><button class="btn-close" id="btnCloseGallery">✖ Close</button>`;
                }
                overlay.classList.add('show');
                document.querySelectorAll('.gallery-item').forEach(item => {
                    item.addEventListener('click', function() {
                        const idx = parseInt(this.dataset.idx);
                        if (idx >= 0 && idx < robotGallery.length) {
                            loadRobotFromGallery(robotGallery[idx]);
                            closeGallery();
                            showToast('✅ Loaded!');
                        }
                    });
                });
                const cb = document.getElementById('btnCloseGallery');
                if (cb) cb.addEventListener('click', closeGallery);
            }

            function closeGallery() {
                document.getElementById('galleryOverlay').classList.remove('show');
                AudioEngine.click();
            }

            function loadRobotFromGallery(data) {
                state.head = data.head;
                state.eyes = data.eyes;
                state.mouth = data.mouth;
                state.arms = data.arms;
                state.legs = data.legs;
                state.bodyColor = data.bodyColor;
                state.ability = data.ability;
                state.interactedCategories = new Set(['head', 'eyes', 'mouth', 'arms', 'legs', 'bodyColor', 'ability']);
                document.getElementById('robotNameInput').value = data.robotName;
                updateRobot();
                AudioEngine.success();
            }

            function pulseRobot() {
                const rg = document.getElementById('robot-group');
                rg.style.transition = 'transform 0.25s ease';
                rg.style.transform = 'scale(1.05)';
                setTimeout(() => rg.style.transform = 'scale(1)', 250);
            }

            function triggerCelebration() {
                const rg = document.getElementById('robot-group');
                rg.classList.add('jumping');
                const la = document.getElementById('arms-group');
                if (la) la.classList.add('waving');
                setTimeout(() => { rg.classList.remove('jumping'); if (la) la.classList.remove('waving'); }, 1800);
            }

            function showToast(m) {
                const t = document.getElementById('toast');
                t.textContent = m;
                t.classList.add('show');
                setTimeout(() => t.classList.remove('show'), 2000);
            }

            function spawnConfetti() {
                const c = document.getElementById('confettiContainer');
                const cols = ['#FF6B6B', '#FFD93D', '#4ECDC4', '#FF8C42', '#A97BCA', '#6BCB77', '#5B9BD5', '#FF9FF3'];
                const sh = ['■', '●', '▲', '★', '♦', '❤️', '🌟', '🎉'];
                const f = document.createDocumentFragment();
                for (let i = 0; i < 70; i++) {
                    const p = document.createElement('div');
                    p.className = 'confetti-piece';
                    p.textContent = sh[Math.floor(Math.random() * sh.length)];
                    p.style.left = Math.random() * 100 + '%';
                    p.style.top = -(Math.random() * 25 + 5) + '%';
                    p.style.fontSize = (Math.random() * 16 + 8) + 'px';
                    p.style.color = cols[Math.floor(Math.random() * cols.length)];
                    p.style.animationDuration = (Math.random() * 2 + 1.8) + 's';
                    p.style.animationDelay = Math.random() * 0.5 + 's';
                    f.appendChild(p);
                }
                c.appendChild(f);
                setTimeout(() => c.innerHTML = '', 3200);
            }

            function showResultCard() {
                const overlay = document.getElementById('resultOverlay');
                const card = document.getElementById('resultCard');
                const rn = document.getElementById('robotNameInput').value.trim() || 'Robo';
                const cn = state.bodyColor.charAt(0).toUpperCase() + state.bodyColor.slice(1);
                const hn = ['round', 'square', 'hexagon', 'oval'];
                const en = ['round', 'star', 'visor', 'heart-shaped'];
                const an = abilityLabels[state.ability] || state.ability;
                const ae = abilityEmoji[state.ability] || '⭐';
                const svgThumb = generateRobotSVGString(state);
                card.innerHTML = `
            <div class="result-card-title">📝 ${studentName}'s Robot</div>
            <div class="result-card-stars">⭐⭐⭐</div>
            <div style="width:120px;height:150px;margin:0 auto;">${svgThumb}</div>
            <div class="result-writing">
              This is <strong>${rn}</strong>.<br>
              It is <span class="blank">${cn}</span>.<br>
              It has a <span class="blank">${hn[state.head]}</span> head and <span class="blank">${en[state.eyes]}</span> eyes.<br>
              It can <span class="blank">${an.toLowerCase()}</span> ${ae}.
            </div>
            <p style="color:#7F8C8D;font-size:0.7rem;">✅ Sent to teacher!</p>
            <button class="btn-close">👍 Great Job!</button>`;
                overlay.classList.add('show');
            }

            function closeResultCard() {
                document.getElementById('resultOverlay').classList.remove('show');
                AudioEngine.click();
            }

            function attachEvents() {
                document.getElementById('categoriesContainer').addEventListener('click', function(e) {
                    const t = e.target.closest('.option-btn') || e.target.closest('.color-swatch');
                    if (!t) return;
                    const cat = t.dataset.cat,
                        val = t.dataset.v;
                    if (cat === 'bodyColor') state.bodyColor = val;
                    else if (cat === 'ability') state.ability = val;
                    else if (cat === 'head') state.head = parseInt(val);
                    else if (cat === 'eyes') state.eyes = parseInt(val);
                    else if (cat === 'mouth') state.mouth = parseInt(val);
                    else if (cat === 'arms') state.arms = parseInt(val);
                    else if (cat === 'legs') state.legs = parseInt(val);
                    state.interactedCategories.add(cat);
                    AudioEngine.click();
                    updateRobot();
                });
                document.getElementById('btnRandom').addEventListener('click', () => {
                    state.head = Math.floor(Math.random() * 4);
                    state.eyes = Math.floor(Math.random() * 4);
                    state.mouth = Math.floor(Math.random() * 4);
                    state.arms = Math.floor(Math.random() * 4);
                    state.legs = Math.floor(Math.random() * 4);
                    state.bodyColor = ['blue', 'green', 'yellow', 'purple', 'orange'][Math.floor(Math.random() *
                        5)];
                    state.ability = ['fly', 'clean', 'cook', 'dance', 'swim'][Math.floor(Math.random() * 5)];
                    state.interactedCategories = new Set(['head', 'eyes', 'mouth', 'arms', 'legs', 'bodyColor',
                        'ability'
                    ]);
                    AudioEngine.random();
                    updateRobot();
                    pulseRobot();
                });
                document.getElementById('btnReset').addEventListener('click', () => {
                    Object.assign(state, { ...defaults, interactedCategories: new Set() });
                    document.getElementById('robotNameInput').value = '';
                    AudioEngine.click();
                    updateRobot();
                    pulseRobot();
                });
                document.getElementById('btnBuild').addEventListener('click', async () => {
                    const data = getCurrentRobotData();
                    AudioEngine.fanfare();
                    triggerCelebration();
                    addToGallery();
                    spawnConfetti();
                    const saved = await saveToFirebase(data);
                    await saveToSheet(data);
                    if (saved) showToast('🎉 Sent to teacher!');
                    else showToast('💾 Saved on device');
                    setTimeout(() => showResultCard(), 1800);
                });
                document.getElementById('resultOverlay').addEventListener('click', function(e) {
                    if (e.target === this || e.target.classList.contains('btn-close'))
                    closeResultCard();
                });
                document.getElementById('galleryOverlay').addEventListener('click', function(e) {
                    if (e.target === this) closeGallery();
                });
                document.getElementById('teacherOverlay').addEventListener('click', function(e) {
                    if (e.target === this) closeTeacherOverlay();
                });
                document.getElementById('btnGalleryOpen').addEventListener('click', () => { showGallery();
                    AudioEngine.click(); });
                document.getElementById('btnTeacherOpen').addEventListener('click', () => { showTeacherLogin();
                    AudioEngine.click(); });
            }

            function setupWelcomeScreen() {
                const dc = document.getElementById('welcomeDots');
                for (let i = 0; i < 14; i++) {
                    const d = document.createElement('div');
                    d.className = 'welcome-bg-dot';
                    d.style.left = Math.random() * 90 + '%';
                    d.style.top = Math.random() * 85 + '%';
                    const s = Math.random() * 12 + 5;
                    d.style.width = s + 'px';
                    d.style.height = s + 'px';
                    d.style.animationDelay = Math.random() * 5 + 's';
                    d.style.animationDuration = (Math.random() * 4 + 3.5) + 's';
                    d.style.background = ['#FFD93D', '#FF6B6B', '#4ECDC4', '#A97BCA', '#FF8C42'][Math.floor(Math.random() *
                        5)];
                    dc.appendChild(d);
                }
                document.getElementById('btnStart').addEventListener('click', () => {
                    AudioEngine.success();
                    document.getElementById('welcomeScreen').classList.add('hidden');
                    document.getElementById('mainGame').classList.add('active');
                    updateRobot();
                });
            }

            function init() {
                buildCategoriesUI();
                attachEvents();
                setupWelcomeScreen();
                updateRobot();
                document.getElementById('btnEnterName').addEventListener('click', () => {
                    const nameInput = document.getElementById('studentNameInput');
                    const name = nameInput.value.trim();
                    if (!name) { showToast('⚠️ Please type your name!'); return; }
                    studentName = name;
                    document.getElementById('studentBadge').textContent = '👤 ' + studentName;
                    document.getElementById('nameOverlay').classList.add('hidden');
                    document.getElementById('welcomeScreen').classList.remove('hidden');
                    AudioEngine.success();
                });
                document.getElementById('studentNameInput').addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') document.getElementById('btnEnterName').click();
                });
                document.addEventListener('click', function initA() { AudioEngine.getContext(); }, { once: true });
                document.addEventListener('touchstart', function initA() { AudioEngine.getContext(); }, { once: true });
            }
            init();
            console.log('🤖 Robot Creator Studio - Ready!');
        })();
    </script>
</body>
</html>
