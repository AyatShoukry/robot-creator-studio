<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Robot Creator Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root {
            --bg: #FFF8E7;
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --text: #2C3E50;
            --blue: #5B9BD5;
            --green: #6BCB77;
            --yellow: #FFD93D;
            --purple: #A97BCA;
            --orange: #FF8C42;
            --shadow: 0 6px 20px rgba(0,0,0,0.08);
            --shadow-sm: 0 3px 8px rgba(0,0,0,0.05);
            --radius: 18px;
            --radius-sm: 10px;
            --font: 'Lexend', Arial, sans-serif;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            width:100%; height:100%; overflow:hidden;
            font-family:var(--font);
            background: linear-gradient(135deg, #FFF8E7 0%, #FFF0D5 25%, #FFE8EC 50%, #E8F8FF 75%, #FFF8E7 100%);
            background-size:400% 400%;
            animation:bgShift 20s ease infinite;
            display:flex; align-items:center; justify-content:center;
            user-select:none; -webkit-tap-highlight-color:transparent;
            touch-action:manipulation;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        @keyframes bgShift {
            0%,100%{background-position:0% 50%}25%{background-position:100% 0%}50%{background-position:100% 100%}75%{background-position:0% 100%}
        }
        .game-wrapper {
            width:100vw; height:100vh; height:100dvh;
            position:relative; display:flex; flex-direction:column; overflow:hidden;
        }
        .student-name-overlay, .robot-name-overlay, .writing-overlay, .profile-overlay {
            position:absolute; inset:0; z-index:310;
            background:rgba(0,0,0,0.6);
            display:flex; align-items:center; justify-content:center;
            transition:opacity 0.4s ease;
        }
        .student-name-overlay.hidden, .robot-name-overlay.hidden, .writing-overlay.hidden, .profile-overlay.hidden {
            opacity:0; pointer-events:none;
        }
        .name-card, .writing-card, .profile-card {
            background:#FFFEF9; border-radius:24px;
            padding:clamp(14px,2.5vmin,24px); text-align:center;
            box-shadow:0 20px 50px rgba(0,0,0,0.3);
            width:92vw; max-width:550px;
            border:3px dashed #FFD93D;
            max-height:88vh; overflow-y:auto;
        }
        .name-card h2, .writing-card h2, .profile-card h2 {
            font-size:clamp(1.2rem,3.5vmin,1.5rem);
            color:#2C3E50; margin-bottom:6px; letter-spacing:0.04em;
        }
        .name-card p, .writing-card p, .profile-card p {
            color:#7F8C8D; font-size:0.85rem; margin-bottom:10px; letter-spacing:0.03em;
        }
        .name-input, .writing-textarea {
            width:100%; padding:12px 16px;
            border:3px dashed #4ECDC4; border-radius:20px;
            font-family:var(--font); font-size:1rem;
            text-align:center; font-weight:700;
            color:#2C3E50; outline:none;
            letter-spacing:0.04em; transition:all var(--transition);
            margin-bottom:10px;
        }
        .writing-textarea {
            text-align:left; min-height:100px; resize:vertical; font-weight:500; font-size:0.9rem;
        }
        .name-input:focus, .writing-textarea:focus {
            border-color:#FF6B6B; border-style:solid;
            box-shadow:0 0 0 5px rgba(255,107,107,0.1);
        }
        .name-input.error {
            border-color:#FF6B6B; animation:shake 0.5s ease;
        }
        @keyframes shake {
            0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}
        }
        .btn-enter, .btn-challenge, .btn-read, .btn-wordbank {
            padding:10px 24px; border:none; border-radius:50px;
            background:linear-gradient(135deg,#FF6B6B,#FF8E53);
            color:#FFF; font-family:var(--font); font-size:0.95rem;
            font-weight:700; cursor:pointer; letter-spacing:0.04em;
            box-shadow:0 6px 20px rgba(255,107,107,0.35);
            transition:all var(--transition);
            -webkit-tap-highlight-color:transparent;
            margin:4px;
        }
        .btn-wordbank {
            background:linear-gradient(135deg,#4ECDC4,#6BCB77);
            box-shadow:0 4px 16px rgba(78,205,196,0.35);
        }
        .btn-enter:active, .btn-challenge:active, .btn-read:active, .btn-wordbank:active {
            transform:scale(0.94);
        }
        .challenge-cards {
            display:flex; flex-direction:column; gap:10px; margin:10px 0;
        }
        .challenge-card {
            background:#FFF; border-radius:16px; padding:12px;
            cursor:pointer; border:3px solid #E8ECF1;
            transition:all var(--transition); text-align:left;
        }
        .challenge-card:active {
            transform:scale(0.97); border-color:#4ECDC4;
            box-shadow:0 0 0 4px rgba(78,205,196,0.1);
        }
        .challenge-card h3 { font-size:1.1rem; margin-bottom:4px; }
        .challenge-card .desc { font-size:0.8rem; color:#7F8C8D; }
        .word-bank {
            display:flex; flex-wrap:wrap; gap:6px; margin:8px 0; justify-content:center;
        }
        .word-bank span {
            background:#E8FAF8; padding:6px 10px; border-radius:15px;
            font-size:0.75rem; font-weight:600; color:#2AA89F;
        }
        .word-bank-popup {
            position:fixed; top:50%; left:50%;
            transform:translate(-50%, -50%);
            background:#FFFEF9; border-radius:20px;
            padding:20px; box-shadow:0 20px 50px rgba(0,0,0,0.3);
            z-index:99999; max-width:90vw; max-height:80vh;
            overflow-y:auto; border:3px solid #4ECDC4;
        }
        .word-bank-popup h3 { margin-bottom:10px; color:#2C3E50; }
        .word-bank-popup .close-popup {
            margin-top:10px; padding:8px 20px;
            border:none; border-radius:50px;
            background:#FF6B6B; color:#FFF;
            font-family:var(--font); font-weight:700; cursor:pointer;
        }
        .sentence-line {
            display:flex; align-items:center; gap:8px;
            margin:8px 0; font-size:0.9rem; text-align:left;
        }
        .sentence-line .number {
            font-weight:700; color:#4ECDC4; min-width:20px;
        }
        .sentence-line .blank {
            flex:1; border-bottom:2px dashed #FF6B6B;
            min-width:60px; min-height:24px;
        }
        .robot-mini { width:60px; height:75px; margin:0 auto; }
        .feedback {
            font-size:1.1rem; font-weight:700; color:#4ECDC4;
            margin:8px 0; animation:popIn 0.5s ease;
        }
        @keyframes popIn {
            0%{transform:scale(0);opacity:0}80%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}
        }
        .welcome-screen {
            position:absolute; inset:0; z-index:100;
            background:linear-gradient(160deg,#FFFFFF 0%,#FFF8E7 40%,#FFE8EC 70%,#E8F0FF 100%);
            display:flex; flex-direction:column;
            align-items:center; justify-content:center; gap:4vmin;
            transition:all 0.5s cubic-bezier(0.4,0,0.2,1); overflow:hidden;
        }
        .welcome-screen.hidden { opacity:0; pointer-events:none; transform:scale(0.93); }
        .welcome-bg-dots { position:absolute; inset:0; pointer-events:none; opacity:0.25; }
        .welcome-bg-dot {
            position:absolute; border-radius:50%; background:var(--accent);
            animation:dotFloat 6s ease-in-out infinite;
        }
        @keyframes dotFloat {
            0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-25px) scale(1.25)}
        }
        .welcome-icon {
            font-size:12vmin; animation:welcomeBounce 1.5s ease-in-out infinite;
            filter:drop-shadow(0 6px 12px rgba(0,0,0,0.1)); z-index:1;
        }
        @keyframes welcomeBounce {
            0%,100%{transform:translateY(0)}30%{transform:translateY(-18px)}50%{transform:translateY(0)}70%{transform:translateY(-8px)}85%{transform:translateY(0)}
        }
        .welcome-title {
            font-size:clamp(1.8rem,7vmin,3rem); font-weight:800;
            color:#2C3E50; text-align:center; z-index:1;
            line-height:1.2; padding:0 16px; letter-spacing:0.03em;
        }
        .btn-start {
            z-index:1; padding:clamp(14px,3vmin,20px) clamp(40px,10vmin,70px);
            font-size:clamp(1.1rem,4vmin,1.7rem); font-weight:700;
            font-family:var(--font); border:none; border-radius:50px;
            background:linear-gradient(135deg,#FF6B6B 0%,#FF8E53 100%);
            color:#FFF; cursor:pointer;
            box-shadow:0 6px 20px rgba(255,107,107,0.35);
            transition:all var(--transition); letter-spacing:0.04em;
            -webkit-tap-highlight-color:transparent;
        }
        .btn-teacher-welcome {
            z-index:1; padding:12px 30px;
            border:2px solid #4ECDC4; border-radius:50px;
            background:#FFF; color:#4ECDC4;
            font-family:var(--font); font-size:1rem; font-weight:700;
            cursor:pointer; letter-spacing:0.04em; transition:all var(--transition);
        }
        .main-game {
            display:flex; flex-direction:column;
            width:100%; height:100%;
            opacity:0; pointer-events:none;
            transform:translateY(15px);
            transition:all 0.45s cubic-bezier(0.4,0,0.2,1);
            background:#FFFFFF; position:absolute; inset:0; z-index:50;
        }
        .main-game.active { opacity:1; pointer-events:all; transform:translateY(0); }
        .top-bar {
            display:flex; align-items:center; justify-content:space-between;
            padding:8px 14px; background:#FAFBFC;
            border-bottom:1.5px solid #F0F0F0;
            flex-shrink:0; gap:8px; flex-wrap:wrap;
        }
        .student-badge {
            background:#4ECDC4; color:#FFF; padding:7px 14px;
            border-radius:20px; font-weight:700;
            font-size:clamp(0.75rem,2vmin,0.9rem);
            letter-spacing:0.03em; white-space:nowrap;
        }
        .robot-name-display {
            flex:1; min-width:100px; padding:10px 14px;
            border:2.5px solid #4ECDC4; border-radius:25px;
            font-family:var(--font); font-size:clamp(0.85rem,2.5vmin,1rem);
            font-weight:600; color:#2C3E50; background:#E8FAF8;
            text-align:center; letter-spacing:0.03em;
        }
        .btn-gallery, .btn-teacher {
            padding:10px 16px; border:2px solid #FFD93D;
            border-radius:25px; background:#FFFEF5;
            cursor:pointer; font-family:var(--font);
            font-size:clamp(0.8rem,2.2vmin,0.9rem);
            font-weight:700; color:#E0B820;
            letter-spacing:0.03em; white-space:nowrap;
            transition:all var(--transition);
        }
        .btn-teacher {
            border:2px solid transparent; background:transparent;
            font-size:1.2rem; opacity:0.5; padding:8px 14px;
        }
        .left-panel {
            width:100%; flex-shrink:0; background:#FAFBFC;
            padding:clamp(6px,1.5vmin,10px) clamp(8px,2vmin,14px);
            display:flex; flex-wrap:wrap; gap:6px;
            overflow-x:auto; overflow-y:hidden;
            border-bottom:1.5px solid #F0F0F0;
            scroll-behavior:smooth; -webkit-overflow-scrolling:touch;
            align-items:center;
        }
        .left-panel::-webkit-scrollbar{height:3px}
        .panel-header {
            display:flex; align-items:center; gap:6px;
            flex-shrink:0; width:100%; justify-content:space-between;
        }
        .panel-title {
            font-size:clamp(0.95rem,2.8vmin,1.2rem);
            font-weight:700; color:#2C3E50;
            letter-spacing:0.03em; white-space:nowrap;
        }
        .progress-bar-wrap {
            flex:1; max-width:120px; height:7px;
            background:#E8ECF1; border-radius:7px;
            overflow:hidden; margin:0 6px;
        }
        .progress-bar-fill {
            height:100%; background:linear-gradient(90deg,#4ECDC4,#6BCB77);
            border-radius:7px; transition:width 0.4s ease; width:0%;
        }
        .step-indicators { display:flex; gap:3px; flex-shrink:0; }
        .step-dot {
            width:6px; height:6px; border-radius:50%;
            background:#DDE1E7; transition:all var(--transition);
        }
        .step-dot.done {
            background:#4ECDC4; box-shadow:0 0 4px rgba(78,205,196,0.4);
        }
        .category-scroll {
            display:flex; gap:7px; width:100%;
            overflow-x:auto; -webkit-overflow-scrolling:touch;
        }
        .category-scroll::-webkit-scrollbar{height:0}
        .category-group {
            background:#FFF; border-radius:var(--radius-sm);
            padding:clamp(7px,1.5vmin,10px) clamp(8px,1.8vmin,12px);
            box-shadow:var(--shadow-sm); flex-shrink:0;
        }
        .category-label {
            font-size:clamp(0.6rem,1.8vmin,0.75rem);
            font-weight:700; color:#7F8C8D; text-transform:uppercase;
            letter-spacing:0.05em; margin-bottom:5px;
            display:flex; align-items:center; gap:4px; white-space:nowrap;
        }
        .options-row { display:flex; flex-wrap:wrap; gap:4px; }
        .option-btn {
            padding:6px 11px; border:2px solid #E8ECF1;
            border-radius:18px; background:#FFF; cursor:pointer;
            font-family:var(--font); font-size:clamp(0.65rem,2vmin,0.8rem);
            font-weight:600; color:#555; letter-spacing:0.03em;
            white-space:nowrap; transition:all var(--transition);
            -webkit-tap-highlight-color:transparent;
        }
        .option-btn:active{transform:scale(0.92)}
        .option-btn.selected {
            border-color:#4ECDC4; background:#E8FAF8;
            color:#2AA89F; box-shadow:0 0 0 3px rgba(78,205,196,0.1);
            font-weight:700;
        }
        .color-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        .color-swatch-wrap {
            display:flex; flex-direction:column;
            align-items:center; gap:3px; cursor:pointer;
        }
        .color-swatch {
            width:clamp(28px,5.5vmin,34px); height:clamp(28px,5.5vmin,34px);
            border-radius:50%; border:2.5px solid #E8ECF1;
            transition:all var(--transition);
        }
        .color-swatch.selected, .color-swatch-wrap.selected .color-swatch {
            border-color:#2C3E50; box-shadow:0 0 0 4px rgba(44,62,80,0.1);
            transform:scale(1.08);
        }
        .color-swatch-name {
            font-size:0.6rem; font-weight:700; color:#555; text-transform:capitalize;
        }
        .right-panel {
            flex:1; display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            background:radial-gradient(ellipse at center,#F8FBFF 0%,#EAF4FB 40%,#DCEAF5 100%);
            position:relative; overflow:hidden; padding:6px; min-height:0;
        }
        .robot-stage {
            position:relative; width:100%;
            max-width:min(360px,65vmin); aspect-ratio:4/5;
            z-index:2; flex-shrink:1;
        }
        .robot-stage svg{width:100%;height:100%}
        #robot-group{animation:floatRobot 3.5s ease-in-out infinite}
        @keyframes floatRobot{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
        #robot-group.jumping{animation:jumpRobot 0.6s ease-out}
        @keyframes jumpRobot{0%{transform:translateY(0) scaleY(1)}30%{transform:translateY(-40px) scaleY(0.85)}60%{transform:translateY(-14px) scaleY(1.05)}80%{transform:translateY(4px) scaleY(0.92)}100%{transform:translateY(0) scaleY(1)}}
        .eye-blink{animation:blinkEyes 3.2s ease-in-out infinite}
        @keyframes blinkEyes{0%,44%,48%,100%{transform:scaleY(1)}46%{transform:scaleY(0.06)}}
        #arms-group.waving{animation:waveArm 0.7s ease-in-out 3}
        @keyframes waveArm{0%,100%{transform:rotate(0deg)}30%{transform:rotate(-22deg)}60%{transform:rotate(8deg)}80%{transform:rotate(-6deg)}}
        .bottom-buttons {
            display:flex; gap:7px; flex-wrap:wrap; justify-content:center;
            padding:clamp(5px,1.2vmin,8px) 6px; flex-shrink:0;
            z-index:3; width:100%; max-width:480px;
        }
        .game-btn {
            padding:clamp(9px,2vmin,12px) clamp(12px,3vmin,20px);
            border:none; border-radius:50px;
            font-family:var(--font); font-size:clamp(0.7rem,2.3vmin,0.9rem);
            font-weight:700; cursor:pointer; letter-spacing:0.03em;
            box-shadow:var(--shadow-sm); white-space:nowrap;
            transition:all var(--transition); -webkit-tap-highlight-color:transparent;
        }
        .game-btn:active{transform:scale(0.92)}
        .btn-random{background:#FFF;color:#5D6D7E;border:2px solid #E0E5EA}
        .btn-reset{background:#FFF;color:#5D6D7E;border:2px solid #E0E5EA}
        .btn-build{background:linear-gradient(135deg,#FF6B6B 0%,#FF8E53 100%);color:#FFF;font-size:clamp(0.75rem,2.6vmin,0.95rem);padding:clamp(10px,2.2vmin,14px) clamp(16px,4.5vmin,28px);box-shadow:0 4px 16px rgba(255,107,107,0.35)}
        .result-overlay,.gallery-overlay,.teacher-overlay {
            position:fixed; inset:0; z-index:99999;
            background:rgba(0,0,0,0.5);
            display:flex; align-items:center; justify-content:center;
            opacity:0; pointer-events:none; transition:opacity 0.35s ease;
        }
        .result-overlay.show,.gallery-overlay.show,.teacher-overlay.show{opacity:1;pointer-events:all}
        .result-card,.gallery-card,.teacher-card {
            background:#FFFEF9; border-radius:20px;
            padding:clamp(14px,2.5vmin,24px) clamp(12px,2.5vmin,20px);
            max-width:600px; width:90vw;
            box-shadow:0 16px 40px rgba(0,0,0,0.2);
            text-align:center;
            transform:translateY(25px);
            transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1);
            max-height:85vh; overflow-y:auto;
        }
        .result-overlay.show .result-card,.gallery-overlay.show .gallery-card,.teacher-overlay.show .teacher-card{transform:translateY(0)}
        .btn-close,.btn-danger,.btn-export {
            margin-top:10px;
            padding:clamp(9px,1.8vmin,12px) clamp(20px,5vmin,36px);
            border:none; border-radius:50px;
            font-family:var(--font); font-size:clamp(0.85rem,2.3vmin,1rem);
            font-weight:700; cursor:pointer; letter-spacing:0.03em;
            box-shadow:0 3px 12px rgba(0,0,0,0.2);
            transition:all var(--transition);
        }
        .btn-close{background:#4ECDC4;color:#FFF}
        .btn-danger{background:#FF6B6B;color:#FFF}
        .btn-export{background:#FF8C42;color:#FFF}
        .teacher-table{width:100%;border-collapse:collapse;font-size:clamp(0.6rem,1.5vmin,0.8rem);margin:10px 0}
        .teacher-table th{background:#4ECDC4;color:#FFF;padding:8px 6px;font-weight:700}
        .teacher-table td{padding:6px;border-bottom:1px solid #F0F0F0}
        .teacher-table img{width:50px;height:62px}
        .gallery-grid{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-height:50vh;overflow-y:auto;padding:6px}
        .gallery-item{background:#FFF;border-radius:14px;padding:8px;box-shadow:var(--shadow-sm);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;border:2px solid #F0F0F0;min-width:80px;transition:all var(--transition)}
        .confetti-piece{position:absolute;z-index:500;pointer-events:none;animation:confettiFall 2.5s ease-out forwards}
        @keyframes confettiFall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1}100%{transform:translateY(100vh) rotate(720deg) scale(0.25);opacity:0}}
        .toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-120px);z-index:99999;background:#2C3E50;color:#FFF;padding:10px 22px;border-radius:50px;font-weight:700;font-size:clamp(0.8rem,2vmin,0.95rem);font-family:var(--font);box-shadow:0 8px 22px rgba(0,0,0,0.2);letter-spacing:0.03em;pointer-events:none;white-space:nowrap;transition:transform 0.45s cubic-bezier(0.34,1.56,0.64,1)}
        .toast.show{transform:translateX(-50%) translateY(0)}
        .teacher-login-input{width:100%;padding:12px 16px;border:2.5px dashed #FF6B6B;border-radius:20px;font-family:var(--font);font-size:1rem;text-align:center;font-weight:700;margin:8px 0;letter-spacing:0.04em;outline:none}
        @media(min-width:768px) and (orientation:landscape){
            .main-game{flex-direction:row;flex-wrap:wrap}
            .top-bar{width:100%}
            .left-panel{width:34%;min-width:290px;max-width:400px;height:calc(100% - 50px);flex-wrap:nowrap;flex-direction:column;overflow-y:auto;overflow-x:hidden;border-bottom:none;border-right:1.5px solid #F0F0F0;padding:10px;gap:8px}
            .category-scroll{flex-direction:column;overflow-y:auto;overflow-x:hidden;gap:8px}
            .category-group{min-width:auto;width:100%}
            .right-panel{flex:1;height:calc(100% - 50px)}
            .robot-stage{max-width:min(400px,45vmin)}
            .challenge-cards{flex-direction:row}
        }
    </style>
</head>
<body>
    <div class="game-wrapper" id="gameWrapper">
        <div class="student-name-overlay" id="studentNameOverlay">
            <div class="name-card">
                <h2>👋 What's your name?</h2>
                <p>Type your name to start creating!</p>
                <input type="text" class="name-input" id="studentNameInput" placeholder="My name is..." maxlength="30" autofocus>
                <br>
                <button class="btn-enter" id="btnEnterStudentName">🚀 Next</button>
                <button class="btn-teacher-welcome" id="btnTeacherFromName" style="margin-top:8px;background:#FFF;color:#4ECDC4;border:2px solid #4ECDC4;">🔑 Teacher Dashboard</button>
            </div>
        </div>

        svg += getAntennaSVG();
        svg += getHeadSVG(data.head) ? getHeadSVG(data.head).replace(/var\(--bodyColor\)/g,c).replace(/var\(--bodyColorDark\)/g,cd) : '';
        svg += getEyesSVG(data.eyes);
        svg += getMouthSVG(data.mouth);
        svg += `<rect x="185" y="152" width="30" height="16" rx="6" fill="#888"/>`;
        svg += getBodySVG() ? getBodySVG().replace(/var\(--bodyColor\)/g,c).replace(/var\(--bodyColorDark\)/g,cd) : '';
        svg += getControlPanelSVG(data.ability);
        svg += getArmsSVG(data.arms) ? getArmsSVG(data.arms).replace(/var\(--bodyColorDark\)/g,cd).replace(/var\(--bodyColor\)/g,c) : '';
        svg += getLegsSVG(data.legs) ? getLegsSVG(data.legs).replace(/var\(--bodyColorDark\)/g,cd) : '';
        svg += `</g></svg>`;
        return svg;
    }

    function attachEvents() {
        document.getElementById('categoriesContainer').addEventListener('click', function(e) {
            const t = e.target.closest('.option-btn') || e.target.closest('.color-swatch-wrap') || e.target.closest('.color-swatch');
            if (!t) return;
            const cat = t.dataset.cat, val = t.dataset.v;
            console.log('Clicked:', cat, val);
            if (cat === 'bodyColor') state.bodyColor = val;
            else if (cat === 'ability') state.ability = val;
            else if (cat === 'head') state.head = parseInt(val);
            else if (cat === 'eyes') state.eyes = parseInt(val);
            else if (cat === 'mouth') state.mouth = parseInt(val);
            else if (cat === 'arms') state.arms = parseInt(val);
            else if (cat === 'legs') state.legs = parseInt(val);
            state.interactedCategories.add(cat);
            AudioEngine.click();
            updateRobot();
        });
        document.getElementById('btnRandom').addEventListener('click', () => {
            state.head = Math.floor(Math.random() * 4);
            state.eyes = Math.floor(Math.random() * 4);
            state.mouth = Math.floor(Math.random() * 4);
            state.arms = Math.floor(Math.random() * 4);
            state.legs = Math.floor(Math.random() * 4);
            state.bodyColor = ['blue', 'green', 'yellow', 'purple', 'orange'][Math.floor(Math.random() * 5)];
            state.ability = ['fly', 'clean', 'cook', 'dance', 'swim'][Math.floor(Math.random() * 5)];
            state.interactedCategories = new Set(['head', 'eyes', 'mouth', 'arms', 'legs', 'bodyColor', 'ability']);
            AudioEngine.random(); updateRobot(); pulseRobot();
        });
        document.getElementById('btnReset').addEventListener('click', () => {
            state.head = null; state.eyes = null; state.mouth = null;
            state.arms = null; state.legs = null; state.bodyColor = null; state.ability = null;
            state.interactedCategories = new Set();
            AudioEngine.click(); updateRobot(); pulseRobot();
        });
        document.getElementById('btnBuild').addEventListener('click', () => { showWritingChallenge(); });
        document.getElementById('btnGalleryOpen').addEventListener('click', () => { showGallery(); AudioEngine.click(); });
        document.getElementById('btnTeacherOpen').addEventListener('click', () => { showTeacherLogin(); AudioEngine.click(); });
        document.getElementById('btnTeacherWelcome').addEventListener('click', () => { showTeacherLogin(); AudioEngine.click(); });
    }

    function init() {
        buildCategoriesUI();
        attachEvents();
        updateRobot();
        document.getElementById('btnTeacherFromName').addEventListener('click', () => { showTeacherLogin(); AudioEngine.click(); });
        document.getElementById('btnEnterStudentName').addEventListener('click', () => {
            const nameInput = document.getElementById('studentNameInput');
            const name = nameInput.value.trim();
            if (!name) { showToast('⚠️ Please type your name!'); return; }
            studentName = name;
            document.getElementById('studentBadge').textContent = '👤 ' + studentName;
            document.getElementById('studentNameOverlay').classList.add('hidden');
            document.getElementById('robotNameOverlay').classList.remove('hidden');
            document.getElementById('robotNameInputOverlay').focus();
            AudioEngine.click();
        });
        document.getElementById('studentNameInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('btnEnterStudentName').click(); });
        document.getElementById('btnEnterRobotName').addEventListener('click', () => {
            const nameInput = document.getElementById('robotNameInputOverlay');
            const name = nameInput.value.trim();
            if (!name) { nameInput.classList.add('error'); showToast('⚠️ Please name your robot!'); setTimeout(() => nameInput.classList.remove('error'), 500); return; }
            robotName = name;
            document.getElementById('robotNameDisplay').textContent = '🤖 ' + robotName;
            document.getElementById('robotNameOverlay').classList.add('hidden');
            document.getElementById('welcomeScreen').classList.remove('hidden');
            AudioEngine.success();
        });
        document.getElementById('robotNameInputOverlay').addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('btnEnterRobotName').click(); });
        document.getElementById('btnStart').addEventListener('click', () => {
            AudioEngine.success();
            document.getElementById('welcomeScreen').classList.add('hidden');
            document.getElementById('mainGame').classList.add('active');
            updateRobot();
        });
        document.addEventListener('click', function initA() { AudioEngine.getContext(); }, { once: true });
        document.addEventListener('touchstart', function initA() { AudioEngine.getContext(); }, { once: true });
    }
    init();
    window.showWordBankPopup = showWordBankPopup;
})();
</script>
</body>
</html>
